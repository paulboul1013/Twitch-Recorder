services:
  backend:
    build:
      context: ./backend
    container_name: twitch-recorder-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./recordings:/recordings
      - ./config:/config
  frontend:
    build:
      context: ./frontend
    container_name: twitch-recorder-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
