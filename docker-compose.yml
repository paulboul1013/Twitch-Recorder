services:
  backend:
    build:
      context: ./backend
    container_name: twitch-recorder-backend
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./recordings:/recordings
      - ./config:/config
  frontend:
    build:
      context: ./frontend
    container_name: twitch-recorder-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
